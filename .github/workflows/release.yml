name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - '*-alpha*'
      - '*-beta*'
      - '*-rc*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.7.0-rum.1'
        required: true
        type: string
      target:
        description: 'Commit, branch, or tag to release. Defaults to the workflow run ref.'
        required: false
        type: string
      allow_existing_tag:
        description: 'Allow rebuilding an existing tag. Latest release date may stay on the old tag commit.'
        required: false
        default: false
        type: boolean

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      target_sha: ${{ steps.release.outputs.target_sha }}
      checkout_ref: ${{ steps.release.outputs.checkout_ref }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      stable: ${{ steps.release.outputs.stable }}
      semver: ${{ steps.release.outputs.semver }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_TAG}"
            target_ref="${INPUT_TARGET:-${GITHUB_SHA}}"

            if ! git check-ref-format "refs/tags/${release_tag}"; then
              echo "::error::Invalid release tag: ${release_tag}"
              exit 1
            fi

            git fetch --tags --force
            if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
              if [ "${INPUT_ALLOW_EXISTING_TAG}" != "true" ]; then
                echo "::error::Release tag ${release_tag} already exists. Use a new tag so GitHub Latest points to the new release commit, or set allow_existing_tag=true to rebuild the old tag."
                exit 1
              fi
              echo "Using existing tag ${release_tag}"
              target_sha="$(git rev-list -n 1 "refs/tags/${release_tag}")"
              checkout_ref="refs/tags/${release_tag}"
            else
              target_sha="$(git rev-parse --verify "${target_ref}^{commit}")"
              checkout_ref="${target_sha}"
              echo "Release tag ${release_tag} will be created from ${target_sha}"
            fi
          elif [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            target_sha="$(git rev-parse --verify "${GITHUB_SHA}^{commit}")"
            checkout_ref="${target_sha}"

            base_tag="$(
              git tag --merged "${target_sha}" --sort=-v:refname |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
                head -n 1 ||
                true
            )"
            if [ -z "${base_tag}" ]; then
              echo "::error::Could not find an upstream vMAJOR.MINOR.PATCH tag reachable from ${target_sha}"
              exit 1
            fi

            base_version="${base_tag#v}"
            latest_rum_tag="$(
              git tag --list "v${base_version}-rum.*" --sort=-v:refname |
                head -n 1 ||
                true
            )"
            if [ -n "${latest_rum_tag}" ]; then
              latest_rum_number="${latest_rum_tag##*-rum.}"
              if ! [[ "${latest_rum_number}" =~ ^[0-9]+$ ]]; then
                echo "::error::Could not parse RUM release number from ${latest_rum_tag}"
                exit 1
              fi
              next_rum_number=$((latest_rum_number + 1))
            else
              next_rum_number=1
            fi

            release_tag="v${base_version}-rum.${next_rum_number}"
            echo "Auto-selected release tag ${release_tag} from upstream ${base_tag}"
          else
            release_tag="${GITHUB_REF_NAME}"
            target_sha="$(git rev-parse --verify "${GITHUB_SHA}^{commit}")"
            checkout_ref="refs/tags/${release_tag}"
          fi

          prerelease_pattern='-(alpha|beta|rc)'
          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'

          if [[ "${release_tag}" =~ ${prerelease_pattern} ]]; then
            prerelease=true
            stable=false
          else
            prerelease=false
            stable=true
          fi

          if [[ "${release_tag}" =~ ${semver_pattern} ]]; then
            semver=true
          else
            semver=false
          fi

          {
            echo "release_tag=${release_tag}"
            echo "target_sha=${target_sha}"
            echo "checkout_ref=${checkout_ref}"
            echo "prerelease=${prerelease}"
            echo "stable=${stable}"
            echo "semver=${semver}"
          } >> "${GITHUB_OUTPUT}"
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_ALLOW_EXISTING_TAG: ${{ inputs.allow_existing_tag }}

  build-and-release:
    runs-on: ubuntu-latest
    needs: prepare-release

    permissions:
      contents: write

    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
      RELEASE_COMMIT: ${{ needs.prepare-release.outputs.target_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: apps/manager-server/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build all-in-one HTML
        run: npm run build
        env:
          VERSION: ${{ env.RELEASE_TAG }}

      - name: Build native release packages
        run: bin/release/package-native.sh
        env:
          VERSION: ${{ env.RELEASE_TAG }}

      - name: Prepare release assets
        run: |
          cd apps/web/dist
          mv index.html management.html
          ls -lh management.html

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${RELEASE_TAG}"
          current_ref="${RELEASE_COMMIT}"
          notes_dir="docs/release-notes"

          # Prefer curated notes: docs/release-notes/<tag>-<lang>.md (zh -> zh-CN -> en)
          primary=""
          for lang in zh zh-CN en; do
            if [ -f "${notes_dir}/${current_tag}-${lang}.md" ]; then
              primary="${notes_dir}/${current_tag}-${lang}.md"
              break
            fi
          done

          if [ -n "${primary}" ]; then
            cp "${primary}" release-notes.md
            echo "Using curated release notes: ${primary}"
          else
            # Fallback: auto-list commits in range (legacy behavior)
            if git rev-parse -q --verify "refs/tags/${current_tag}" >/dev/null; then
              current_ref="${current_tag}"
            fi

            previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
            if [ -n "${previous_tag}" ]; then
              range="${previous_tag}..${current_ref}"
            else
              range="${current_ref}"
            fi

            : > release-notes.md
            git log --pretty=format:"- %h %s" "${range}" >> release-notes.md
            echo "Looked for: ${notes_dir}/${current_tag}-{zh,zh-CN,en}.md"
            echo "No curated notes for ${current_tag}; fell back to git log"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ env.RELEASE_COMMIT }}
          name: ${{ env.RELEASE_TAG }}
          files: |
            apps/web/dist/management.html
            dist/native/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          make_latest: ${{ needs.prepare-release.outputs.stable == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: prepare-release

    permissions:
      contents: read
      packages: write

    env:
      DOCKERHUB_IMAGE: lzt404/cpa-manager-plus-rum
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/cpa-manager-plus-rum
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker publish targets
        id: docker_targets
        run: |
          set -euo pipefail

          images="${GHCR_IMAGE}"
          dockerhub_enabled=false
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            images="${images}"$'\n'"${DOCKERHUB_IMAGE}"
            dockerhub_enabled=true
          else
            echo "::warning::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are not both configured; DockerHub publish will be skipped."
          fi

          {
            echo "images<<EOF"
            echo "${images}"
            echo "EOF"
            echo "dockerhub_enabled=${dockerhub_enabled}"
          } >> "${GITHUB_OUTPUT}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.docker_targets.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker_targets.outputs.images }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }},enable=${{ needs.prepare-release.outputs.semver == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }},enable=${{ needs.prepare-release.outputs.semver == 'true' && needs.prepare-release.outputs.stable == 'true' }}
            type=raw,value=latest,enable=${{ needs.prepare-release.outputs.stable == 'true' }}
          labels: |
            org.opencontainers.image.title=CPA Manager Plus RUM
            org.opencontainers.image.description=CPA Manager Plus RUM Manager Server container image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme

      - name: Build and push Manager Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.manager-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}

      - name: Update DockerHub overview
        if: steps.docker_targets.outputs.dockerhub_enabled == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          short-description: CPA Manager Plus RUM with Dockerized Manager Server
          readme-filepath: ./README.md
